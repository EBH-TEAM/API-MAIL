<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EBH TEAM | মেইল ও OTP জেনারেটর</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 32px 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .header h1 {
            color: #e33b3b;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* মেইল জেনারেটর সেকশন */
        .mail-section {
            background: linear-gradient(135deg, #e8f0fe, #dce8f5);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #c5d5e8;
        }

        .mail-section h3 {
            color: #1a73e8;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .open-btn {
            background: linear-gradient(135deg, #1a73e8, #0d5bbf);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }

        .open-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(26, 115, 232, 0.3);
        }

        /* OTP চেকার সেকশন */
        .otp-section {
            background: linear-gradient(135deg, #fefaf5, #fff0e6);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid #ffe0b3;
        }

        .otp-section h3 {
            color: #e67e22;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #e67e22;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 60px;
            border: 1px solid #ffe0b3;
            background: white;
            font-size: 14px;
            font-family: monospace;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: #e67e22;
            box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.1);
        }

        .api-note {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
            font-family: monospace;
            word-break: break-all;
        }

        .check-btn {
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }

        .check-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(230, 126, 34, 0.3);
        }

        .note {
            font-size: 11px;
            color: #94a3b8;
            text-align: center;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
        }

        @media (max-width: 480px) {
            .card { padding: 24px 20px; }
            .header h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>📬 EBH TEAM</h1>
        <p>মেইল জেনারেট ও OTP চেক করুন</p>
    </div>

    <!-- সেকশন ১: মেইল জেনারেট -->
    <div class="mail-section">
        <h3>
            <span>✉️</span> নতুন মেইল তৈরি করুন
        </h3>
        <button class="open-btn" id="generateMailBtn">
            🚀 নতুন মেইল পেতে ক্লিক করুন
        </button>
        <div class="api-note" style="margin-top: 15px;">
          
        </div>
    </div>

    <!-- সেকশন ২: OTP চেকার -->
    <div class="otp-section">
        <h3>
            <span>🔐</span> OTP চেক করুন
        </h3>
        <div class="input-group">
            <label>📧 ইমেইল ঠিকানা লিখুন</label>
            <input type="text" id="emailInput" placeholder="যেমন: yr4rjl3rdnrgisp@sau6.me">
            <div class="api-note" id="apiPreview">
              
            </div>
        </div>
        <button class="check-btn" id="checkOtpBtn">
            🔍 OTP চেক করুন (ব্রাউজারে খুলবে)
        </button>
    </div>

    <div class="note">
        ⚡ উপরের বাটনে ক্লিক করলে ব্রাউজারে মেইল দেখাবে<br>
        ⚡ নিচে ইমেইল লিখে চেক করলে OTP দেখাবে
    </div>
</div>

<script>
    // ============================================
    // API লিংক
    // ============================================
    const GENERATE_MAIL_URL = "http://api.mtien.click/public/GetMailCode.aspx?key=mtienv25102025&act=get-mail";
    const OTP_API_BASE = "http://api.mtien.click/public/GetMailCode.aspx?key=mtienv25102025&email=";

    // DOM এলিমেন্টস
    const generateMailBtn = document.getElementById('generateMailBtn');
    const checkOtpBtn = document.getElementById('checkOtpBtn');
    const emailInput = document.getElementById('emailInput');
    const apiPreview = document.getElementById('apiPreview');

    // ইমেইল টাইপ করার সময় API লিংক প্রিভিউ আপডেট করা
    emailInput.addEventListener('input', function() {
        const email = emailInput.value.trim();
        if (email) {
            apiPreview.innerHTML = `🔗 লিংক: ${OTP_API_BASE}${encodeURIComponent(email)}`;
        } else {
            apiPreview.innerHTML = `🔗 লিংক: ${OTP_API_BASE}আপনার_ইমেইল`;
        }
    });

    // বাটন ১: মেইল জেনারেট - গুগল ক্রোমে খুলবে
    generateMailBtn.addEventListener('click', function() {
        window.open(GENERATE_MAIL_URL, '_blank');
    });

    // বাটন ২: OTP চেক - গুগল ক্রোমে খুলবে
    checkOtpBtn.addEventListener('click', function() {
        let email = emailInput.value.trim();
        
        if (!email) {
            alert("দয়া করে ইমেইল লিখুন!");
            return;
        }
        
        if (!email.includes('@')) {
            alert("সঠিক ইমেইল দিন! (@ থাকতে হবে)");
            return;
        }
        
        const fullUrl = OTP_API_BASE + encodeURIComponent(email);
        window.open(fullUrl, '_blank');
    });

    console.log("✅ রেডি!");
</script>
</body>
</html>
